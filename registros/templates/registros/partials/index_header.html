<header class="mb-6 rounded-2xl border border-white/10 bg-slate-900/95 px-5 py-4 text-white shadow-xl backdrop-blur-md">
  <div class="flex items-center gap-3">

    <!-- Info del remate: ocupa todo el espacio sobrante y trunca -->
    <div class="flex flex-col min-w-0 flex-1 overflow-hidden">
      <div class="flex items-center gap-1.5 mb-1 overflow-hidden">
        <span class="rounded-full bg-emerald-500/20 px-2 py-0.5 text-[9.5px] font-black uppercase tracking-wide text-emerald-300 border border-emerald-500/30 whitespace-nowrap">PR</span>
        <span class="truncate text-[10.5px] font-extrabold uppercase tracking-wider text-amber-300">Remate Activo</span>
      </div>
      <h1 class="truncate text-base sm:text-lg font-black tracking-tight text-white leading-tight">{{ remate_activo.nombre }}</h1>
      <p class="truncate text-[12.5px] font-semibold text-slate-400 leading-tight mt-0.5">
        {% if remate_activo.fecha %}{{ remate_activo.fecha|date:"d/m/Y" }}{% else %}Sin fecha{% endif %}{% if remate_activo.lugar %} · {{ remate_activo.lugar }}{% endif %}
      </p>
    </div>

    <!-- Separador -->
    <div class="h-10 w-px bg-white/10 shrink-0"></div>

    <!-- Total de Cabezas -->
    <div class="flex items-center gap-2 shrink-0">
      <p class="text-2xl sm:text-3xl font-black text-white leading-none" id="totalCabesasCorreales">0</p>
      <div class="flex flex-col">
        <p class="text-[9.5px] font-extrabold uppercase tracking-widest text-slate-400 leading-none">Cabezas</p>
        <p class="text-[10.5px] font-bold text-emerald-400 leading-tight mt-0.5">En Corrales</p>
      </div>
    </div>

    <!-- Separador -->
    <div class="h-10 w-px bg-white/10 shrink-0"></div>

    <!-- Botones -->
    <div class="flex items-center gap-2 shrink-0">
      <button onclick="window.location.reload();" type="button" title="Recargar página"
        class="inline-flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 border border-white/10 h-10 w-10 text-white shadow-sm transition-all hover:scale-105 active:scale-95 duration-200">
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        <span class="sr-only">Recargar página</span>
      </button>

      <button id="toggleDesktopViewBtn" type="button" title="Modo escritorio"
        class="inline-flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 border border-white/10 h-10 w-10 text-white shadow-sm transition-all hover:scale-105 active:scale-95 duration-200">
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        <span class="sr-only">Modo escritorio</span>
      </button>

      <a href="{% url 'remates-home' %}" title="Cambiar remate"
        class="inline-flex items-center justify-center rounded-lg bg-emerald-600 hover:bg-emerald-700 h-10 w-10 text-white shadow-md transition-all hover:scale-105 active:scale-95 duration-200">
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
        </svg>
        <span class="sr-only">Cambiar remate</span>
      </a>
    </div>

  </div>
</header>
